    &lt;main class=&quot;rma-main&quot;&gt;
      &lt;div class=&quot;rma-topbar&quot;&gt;
        &lt;select class=&quot;rma-mobile-nav&quot; aria-label=&quot;Jump to section&quot;&gt;
          &lt;option value=&quot;#answer&quot;&gt;Recall memory system&lt;/option&gt;&lt;option value=&quot;#architecture&quot;&gt;Architecture&lt;/option&gt;&lt;option value=&quot;#model&quot;&gt;Memory model&lt;/option&gt;&lt;option value=&quot;#attention&quot;&gt;Attention&lt;/option&gt;&lt;option value=&quot;#roadmap&quot;&gt;Roadmap&lt;/option&gt;
        &lt;/select&gt;
        &lt;button class=&quot;rma-btn&quot; type=&quot;button&quot; data-action=&quot;expand&quot;&gt;Expand examples&lt;/button&gt;
        &lt;button class=&quot;rma-btn&quot; type=&quot;button&quot; data-action=&quot;print&quot;&gt;Print / PDF&lt;/button&gt;
      &lt;/div&gt;

      &lt;div class=&quot;rma-content&quot;&gt;
        &lt;section class=&quot;rma-hero&quot; id=&quot;answer&quot;&gt;
          &lt;div class=&quot;rma-kicker&quot;&gt;Definitive architecture · build specification&lt;/div&gt;
          &lt;h1&gt;A memory system for a &lt;em&gt;shared life.&lt;/em&gt;&lt;/h1&gt;
          &lt;p class=&quot;rma-deck&quot;&gt;Recall is not a chatbot with a larger prompt. It is a relationship system that preserves what happened, compiles what is true now, carries unfinished life forward, and decides—carefully—whether this moment deserves a memory, a joke, a reminder, a repair, or silence.&lt;/p&gt;
          &lt;div class=&quot;rma-hero-meta&quot;&gt;&lt;span&gt;Status: architecture locked&lt;/span&gt;&lt;span&gt;Audience: product + engineering&lt;/span&gt;&lt;span&gt;Scope: memory, continuity, attention, relationship&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;rma-thesis&quot;&gt;
            &lt;div class=&quot;rma-thesis-main&quot;&gt;&lt;small&gt;The one-sentence decision&lt;/small&gt;&lt;p&gt;Build a local, evidence-first temporal memory ledger that produces rebuildable beliefs and life threads; compile those into bounded context; place a policy-driven attention engine before personality and voice.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-thesis-side&quot;&gt;
              &lt;div class=&quot;rma-axiom&quot;&gt;&lt;b&gt;01&lt;/b&gt; Evidence is permanent history; “current truth” is a projection.&lt;/div&gt;
              &lt;div class=&quot;rma-axiom&quot;&gt;&lt;b&gt;02&lt;/b&gt; Relevance finds candidates; applicability decides whether they belong now.&lt;/div&gt;
              &lt;div class=&quot;rma-axiom&quot;&gt;&lt;b&gt;03&lt;/b&gt; Attention chooses between action and silence; personality chooses how.&lt;/div&gt;
              &lt;div class=&quot;rma-axiom&quot;&gt;&lt;b&gt;04&lt;/b&gt; The user—not the model—has final authority over memory.&lt;/div&gt;
            &lt;/div&gt;
          &lt;/div&gt;
        &lt;/section&gt;

        &lt;section id=&quot;decisions&quot;&gt;
          &lt;div class=&quot;rma-section-head&quot;&gt;&lt;div class=&quot;rma-index&quot;&gt;01 · Hard decisions&lt;/div&gt;&lt;div&gt;&lt;h2&gt;One architecture, not a menu.&lt;/h2&gt;&lt;p&gt;The research points to a layered system: immutable evidence below, temporal state in the middle, attention above, relationship behavior last. Each layer has one job and a clear failure boundary.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
          &lt;div class=&quot;rma-grid-3&quot;&gt;
            &lt;article class=&quot;rma-card&quot;&gt;&lt;span class=&quot;rma-number&quot;&gt;1&lt;/span&gt;&lt;h3&gt;What are we building?&lt;/h3&gt;&lt;p&gt;A continuity engine for a friend: it remembers backward, forward, and relationally. It knows what changed, what remains open, what belongs in this moment, and what Recall itself owes the user.&lt;/p&gt;&lt;/article&gt;
            &lt;article class=&quot;rma-card&quot;&gt;&lt;span class=&quot;rma-number&quot;&gt;2&lt;/span&gt;&lt;h3&gt;Why this architecture?&lt;/h3&gt;&lt;p&gt;Because warmth cannot rescue false memory. Evidence-first state makes Recall correctable; projections make it useful; attention makes it feel present; relationship policy makes presence safe and human.&lt;/p&gt;&lt;/article&gt;
            &lt;article class=&quot;rma-card&quot;&gt;&lt;span class=&quot;rma-number&quot;&gt;3&lt;/span&gt;&lt;h3&gt;What ships first?&lt;/h3&gt;&lt;p&gt;The memory contract, canonical ledger, temporal belief projector, correction/deletion propagation, hardened prospective triggers, and context compiler—before autonomous proactivity or learned personality.&lt;/p&gt;&lt;/article&gt;
          &lt;/div&gt;
          &lt;div class=&quot;rma-callout&quot;&gt;&lt;strong&gt;Not a brain simulation.&lt;/strong&gt; We borrow useful functional distinctions from human memory—episodes, current beliefs, future intentions, working focus, emotional context—without pretending to reproduce biology. The architecture stays inspectable, testable, and reversible.&lt;/div&gt;
          &lt;h3&gt;Research distilled into product decisions&lt;/h3&gt;
          &lt;div class=&quot;rma-grid-3&quot; style=&quot;margin-bottom:24px&quot;&gt;
            &lt;div class=&quot;rma-card&quot;&gt;&lt;h4&gt;Long context is not memory&lt;/h4&gt;&lt;p&gt;More tokens improve recall until stale and contradictory context accumulates. Recall therefore compiles a small current state instead of replaying a life transcript.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-card&quot;&gt;&lt;h4&gt;Human remembering is reconstructive&lt;/h4&gt;&lt;p&gt;Useful memory updates meaning over time, but reconstruction can distort. Recall keeps the source episode and makes every reconstruction reversible.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-card&quot;&gt;&lt;h4&gt;Forward memory is fundamental&lt;/h4&gt;&lt;p&gt;Remembering what to do when a context returns is distinct from retrieving the past. Prospective triggers are a first-class lifecycle, not a search hack.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-card&quot;&gt;&lt;h4&gt;Unfinished situations stay active&lt;/h4&gt;&lt;p&gt;People naturally maintain open goals and expected developments. Threads make Recall carry situations rather than isolated facts.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-card&quot;&gt;&lt;h4&gt;Relationship quality is interaction history&lt;/h4&gt;&lt;p&gt;Trust depends on promises, boundaries, mistakes, and repair—not only a user profile. Recall needs memory of its own conduct.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-card&quot;&gt;&lt;h4&gt;Timing beats maximum recall&lt;/h4&gt;&lt;p&gt;A relevant memory can still be intrusive, repetitive, or unsafe. Attention and silence must be evaluated separately from retrieval quality.&lt;/p&gt;&lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;rma-table-wrap&quot;&gt;
            &lt;table&gt;
              &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Decision&lt;/th&gt;&lt;th&gt;Canonical choice&lt;/th&gt;&lt;th&gt;Reason&lt;/th&gt;&lt;th&gt;Do not do&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
              &lt;tbody&gt;
                &lt;tr&gt;&lt;td&gt;Source of truth&lt;/td&gt;&lt;td&gt;Append-only local structured event ledger, with tombstones and revisions&lt;/td&gt;&lt;td&gt;Transactional, auditable, temporal, user-correctable&lt;/td&gt;&lt;td&gt;Treat vector search results or an LLM summary as truth&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Semantic retrieval&lt;/td&gt;&lt;td&gt;Supermemory Local as index, relation extractor, document processor, and candidate generator&lt;/td&gt;&lt;td&gt;Excellent warehouse; wrong place for Recall-specific policy&lt;/td&gt;&lt;td&gt;Make Supermemory metadata carry every lifecycle invariant&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Current truth&lt;/td&gt;&lt;td&gt;Rebuildable temporal beliefs linked to evidence&lt;/td&gt;&lt;td&gt;History survives corrections and changing preferences&lt;/td&gt;&lt;td&gt;Rewrite the old memory in place and lose the telling&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Personal context&lt;/td&gt;&lt;td&gt;Slot-based context compiler with source, time, confidence, and scope&lt;/td&gt;&lt;td&gt;Prevents prompt soup and stale-profile leakage&lt;/td&gt;&lt;td&gt;Stuff the whole profile or top-k hits into every turn&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Proactivity&lt;/td&gt;&lt;td&gt;Unified attention policy after retrieval, before style&lt;/td&gt;&lt;td&gt;Silence becomes an explicit, testable action&lt;/td&gt;&lt;td&gt;Let similarity or the final LLM decide when to interrupt&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Personality&lt;/td&gt;&lt;td&gt;Stable core + learned relationship dialect + moment regulation&lt;/td&gt;&lt;td&gt;Adaptation without sycophancy or identity drift&lt;/td&gt;&lt;td&gt;One “be funny” prompt or pure user mirroring&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Privacy&lt;/td&gt;&lt;td&gt;Trust-aware write broker, spaces/scopes, provenance, deletion cascade&lt;/td&gt;&lt;td&gt;Memory is an attack surface and a user-controlled record&lt;/td&gt;&lt;td&gt;Let documents, web pages, or tool output write user beliefs&lt;/td&gt;&lt;/tr&gt;
              &lt;/tbody&gt;
            &lt;/table&gt;
          &lt;/div&gt;
          &lt;div style=&quot;height:22px&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;rma-grid-4&quot;&gt;
            &lt;div class=&quot;rma-card&quot;&gt;&lt;span class=&quot;rma-badge now&quot;&gt;Build now&lt;/span&gt;&lt;h4&gt;Reliable continuity&lt;/h4&gt;&lt;p&gt;Ledger, temporal state, conflicts, prospective triggers, context compiler, deletion.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-card&quot;&gt;&lt;span class=&quot;rma-badge next&quot;&gt;Build next&lt;/span&gt;&lt;h4&gt;Living life model&lt;/h4&gt;&lt;p&gt;Threads, people/place/project dossiers, weekly/monthly views, text emotion hypotheses.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-card&quot;&gt;&lt;span class=&quot;rma-badge later&quot;&gt;Experiment&lt;/span&gt;&lt;h4&gt;Relational intelligence&lt;/h4&gt;&lt;p&gt;Attention shadow mode, humor adaptation, repair state machine, voice prosody.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-card&quot;&gt;&lt;span class=&quot;rma-badge reject&quot;&gt;Reject for now&lt;/span&gt;&lt;h4&gt;Opaque cognition&lt;/h4&gt;&lt;p&gt;Learned memory controller, autonomous rewriting, global scores, engagement optimization.&lt;/p&gt;&lt;/div&gt;
          &lt;/div&gt;
        &lt;/section&gt;

        &lt;section id=&quot;current&quot;&gt;
          &lt;div class=&quot;rma-section-head&quot;&gt;&lt;div class=&quot;rma-index&quot;&gt;02 · Current foundation&lt;/div&gt;&lt;div&gt;&lt;h2&gt;Keep the strong prototype. Change who owns truth.&lt;/h2&gt;&lt;p&gt;Recall already proves the experience: voice, capture, semantic recall, conflicts, commitments, prospective triggers, anniversaries, pins, forgetting, and overnight synthesis. The next architecture does not throw this away; it gives it a dependable spine.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
          &lt;div class=&quot;rma-grid-2&quot;&gt;
            &lt;div&gt;
              &lt;h3&gt;Already real in the repository&lt;/h3&gt;
              &lt;div class=&quot;rma-lanes&quot;&gt;
                &lt;div class=&quot;rma-lane&quot;&gt;&lt;b&gt;Capture envelope&lt;/b&gt;&lt;p&gt;Type, provenance, story date, due date, emotion, salience, entities, hints, prospective intent.&lt;/p&gt;&lt;span&gt;Preserve&lt;/span&gt;&lt;/div&gt;
                &lt;div class=&quot;rma-lane&quot;&gt;&lt;b&gt;Fusion retrieval&lt;/b&gt;&lt;p&gt;Parallel semantic probes, RRF, entity/date arbitration, duplicate collapse, conflict retention.&lt;/p&gt;&lt;span&gt;Reuse&lt;/span&gt;&lt;/div&gt;
                &lt;div class=&quot;rma-lane&quot;&gt;&lt;b&gt;Continuity&lt;/b&gt;&lt;p&gt;Write-time update annotation; rescheduled commitments supersede old agenda entries.&lt;/p&gt;&lt;span&gt;Harden&lt;/span&gt;&lt;/div&gt;
                &lt;div class=&quot;rma-lane&quot;&gt;&lt;b&gt;Forward memory&lt;/b&gt;&lt;p&gt;Exact-first contextual triggers with conservative fuzzy fallback, snooze, resolve, cancel.&lt;/p&gt;&lt;span&gt;Formalize&lt;/span&gt;&lt;/div&gt;
                &lt;div class=&quot;rma-lane&quot;&gt;&lt;b&gt;Returning past&lt;/b&gt;&lt;p&gt;Deterministic month/six-month/year anniversary queries over story dates.&lt;/p&gt;&lt;span&gt;Project&lt;/span&gt;&lt;/div&gt;
                &lt;div class=&quot;rma-lane&quot;&gt;&lt;b&gt;Agency + control&lt;/b&gt;&lt;p&gt;Pinned safety/boundaries, ledger status, preview-before-forget, spaces, export, Night Shift.&lt;/p&gt;&lt;span&gt;Connect&lt;/span&gt;&lt;/div&gt;
                &lt;div class=&quot;rma-lane&quot;&gt;&lt;b&gt;Voice surface&lt;/b&gt;&lt;p&gt;ElevenLabs sessions carry Recall into real-time conversation; OpenRouter/Eve provides reasoning.&lt;/p&gt;&lt;span&gt;Keep thin&lt;/span&gt;&lt;/div&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div&gt;
              &lt;h3&gt;The structural gap&lt;/h3&gt;
              &lt;div class=&quot;rma-card&quot; style=&quot;height:calc(100% - 42px)&quot;&gt;
                &lt;p style=&quot;color:var(--ink-2);font-size:15px&quot;&gt;Today, Supermemory documents and mutable metadata sometimes act as both evidence and state. That works for a prototype, but lifecycle races, stale list metadata, in-place amendments, and mixed derived records reveal the boundary.&lt;/p&gt;
                &lt;div class=&quot;rma-callout&quot; style=&quot;margin:20px 0&quot;&gt;&lt;strong&gt;The fix:&lt;/strong&gt; acknowledge the user only after a local event is durably appended. Everything else—enrichment, embedding, belief updates, dossiers, summaries—can be recomputed from that evidence.&lt;/div&gt;
                &lt;p&gt;Existing APIs become adapters over the new services. The UI and voice tools do not need a rewrite. Supermemory remains the semantic warehouse; it stops being the sole transactional ledger for Recall’s truth.&lt;/p&gt;
              &lt;/div&gt;
            &lt;/div&gt;
          &lt;/div&gt;
        &lt;/section&gt;

        &lt;section id=&quot;architecture&quot;&gt;
          &lt;div class=&quot;rma-section-head&quot;&gt;&lt;div class=&quot;rma-index&quot;&gt;03 · Complete architecture&lt;/div&gt;&lt;div&gt;&lt;h2&gt;Evidence → state → attention → relationship.&lt;/h2&gt;&lt;p&gt;Data flows upward; authority flows downward. The generator may phrase a memory, but it cannot invent one. The attention layer may choose silence, but it cannot erase a commitment. Every derived decision remains traceable to evidence and policy.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
          &lt;div class=&quot;rma-pills&quot; aria-label=&quot;Architecture lens&quot;&gt;
            &lt;button class=&quot;rma-pill active&quot; data-focus=&quot;all&quot;&gt;All layers&lt;/button&gt;&lt;button class=&quot;rma-pill&quot; data-focus=&quot;evidence&quot;&gt;Evidence&lt;/button&gt;&lt;button class=&quot;rma-pill&quot; data-focus=&quot;state&quot;&gt;State&lt;/button&gt;&lt;button class=&quot;rma-pill&quot; data-focus=&quot;decision&quot;&gt;Decision&lt;/button&gt;&lt;button class=&quot;rma-pill&quot; data-focus=&quot;relationship&quot;&gt;Relationship&lt;/button&gt;
          &lt;/div&gt;
          &lt;div class=&quot;rma-architecture&quot; data-architecture&gt;
            &lt;div class=&quot;rma-arch-row&quot;&gt;&lt;div class=&quot;rma-arch-label&quot;&gt;Experience&lt;/div&gt;&lt;div class=&quot;rma-arch-nodes&quot;&gt;
              &lt;div class=&quot;rma-node rma-span-4&quot; data-layer=&quot;relationship&quot;&gt;&lt;b&gt;Voice + chat&lt;/b&gt;&lt;span&gt;ElevenLabs · text UI · documents&lt;/span&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-node rma-span-4&quot; data-layer=&quot;relationship&quot;&gt;&lt;b&gt;Relationship expression&lt;/b&gt;&lt;span&gt;tone · humor · repair · timing&lt;/span&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-node rma-span-4&quot; data-layer=&quot;relationship&quot;&gt;&lt;b&gt;Response generator&lt;/b&gt;&lt;span&gt;grounded language, never memory authority&lt;/span&gt;&lt;/div&gt;
            &lt;/div&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-arch-arrow&quot;&gt;↓&lt;/div&gt;
            &lt;div class=&quot;rma-arch-row&quot;&gt;&lt;div class=&quot;rma-arch-label&quot;&gt;Decision&lt;/div&gt;&lt;div class=&quot;rma-arch-nodes&quot;&gt;
              &lt;div class=&quot;rma-node rma-span-8&quot; data-layer=&quot;decision&quot;&gt;&lt;b&gt;Unified attention engine&lt;/b&gt;&lt;span&gt;hard gates → expected value → interruption cost → action or silence&lt;/span&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-node rma-span-4&quot; data-layer=&quot;decision&quot;&gt;&lt;b&gt;Policy + safety&lt;/b&gt;&lt;span&gt;privacy · scope · cooldown · sensitivity&lt;/span&gt;&lt;/div&gt;
            &lt;/div&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-arch-arrow&quot;&gt;↑ compiled context · candidates&lt;/div&gt;
            &lt;div class=&quot;rma-arch-row&quot;&gt;&lt;div class=&quot;rma-arch-label&quot;&gt;Compilation&lt;/div&gt;&lt;div class=&quot;rma-arch-nodes&quot;&gt;
              &lt;div class=&quot;rma-node rma-span-6&quot; data-layer=&quot;state&quot;&gt;&lt;b&gt;Context compiler&lt;/b&gt;&lt;span&gt;pinned · working · threads · applicable beliefs · triggers&lt;/span&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-node rma-span-3&quot; data-layer=&quot;state&quot;&gt;&lt;b&gt;Retrieval planner&lt;/b&gt;&lt;span&gt;semantic · keyword · entity · time · graph&lt;/span&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-node rma-span-3&quot; data-layer=&quot;state&quot;&gt;&lt;b&gt;Applicability filter&lt;/b&gt;&lt;span&gt;time · scope · trust · current state&lt;/span&gt;&lt;/div&gt;
            &lt;/div&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-arch-arrow&quot;&gt;↑&lt;/div&gt;
            &lt;div class=&quot;rma-arch-row&quot;&gt;&lt;div class=&quot;rma-arch-label&quot;&gt;Living state&lt;/div&gt;&lt;div class=&quot;rma-arch-nodes&quot;&gt;
              &lt;div class=&quot;rma-node rma-span-3&quot; data-layer=&quot;state&quot;&gt;&lt;b&gt;Current beliefs&lt;/b&gt;&lt;span&gt;bitemporal · confidence · evidence links&lt;/span&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-node rma-span-3&quot; data-layer=&quot;state&quot;&gt;&lt;b&gt;Life threads&lt;/b&gt;&lt;span&gt;open loops · expected next · resolution&lt;/span&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-node rma-span-2&quot; data-layer=&quot;state&quot;&gt;&lt;b&gt;Prospective&lt;/b&gt;&lt;span&gt;context triggers&lt;/span&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-node rma-span-2&quot; data-layer=&quot;relationship&quot;&gt;&lt;b&gt;Relationship&lt;/b&gt;&lt;span&gt;promises · ruptures · jokes&lt;/span&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-node rma-span-2&quot; data-layer=&quot;state&quot;&gt;&lt;b&gt;Projections&lt;/b&gt;&lt;span&gt;dossiers · week · month&lt;/span&gt;&lt;/div&gt;
            &lt;/div&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-arch-arrow&quot;&gt;↑ asynchronous projectors&lt;/div&gt;
            &lt;div class=&quot;rma-arch-row&quot;&gt;&lt;div class=&quot;rma-arch-label&quot;&gt;Evidence + index&lt;/div&gt;&lt;div class=&quot;rma-arch-nodes&quot;&gt;
              &lt;div class=&quot;rma-node rma-span-5&quot; data-layer=&quot;evidence&quot;&gt;&lt;b&gt;Canonical local event ledger&lt;/b&gt;&lt;span&gt;append-only evidence · revisions · tombstones · audit&lt;/span&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-node rma-span-3&quot; data-layer=&quot;evidence&quot;&gt;&lt;b&gt;Write broker&lt;/b&gt;&lt;span&gt;trust · redaction · provenance · scope&lt;/span&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-node rma-span-4&quot; data-layer=&quot;evidence&quot;&gt;&lt;b&gt;Supermemory Local&lt;/b&gt;&lt;span&gt;documents · embeddings · extraction · semantic candidates&lt;/span&gt;&lt;/div&gt;
            &lt;/div&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-arch-arrow&quot;&gt;↑&lt;/div&gt;
            &lt;div class=&quot;rma-arch-row&quot;&gt;&lt;div class=&quot;rma-arch-label&quot;&gt;Sources&lt;/div&gt;&lt;div class=&quot;rma-arch-nodes&quot;&gt;
              &lt;div class=&quot;rma-node rma-span-3&quot; data-layer=&quot;evidence&quot;&gt;&lt;b&gt;User speech / text&lt;/b&gt;&lt;span&gt;first-party evidence&lt;/span&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-node rma-span-3&quot; data-layer=&quot;evidence&quot;&gt;&lt;b&gt;User-approved files&lt;/b&gt;&lt;span&gt;quoted external evidence&lt;/span&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-node rma-span-3&quot; data-layer=&quot;evidence&quot;&gt;&lt;b&gt;Tools + web&lt;/b&gt;&lt;span&gt;untrusted context by default&lt;/span&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-node rma-span-3&quot; data-layer=&quot;relationship&quot;&gt;&lt;b&gt;Recall behavior&lt;/b&gt;&lt;span&gt;promises · mistakes · outcomes&lt;/span&gt;&lt;/div&gt;
            &lt;/div&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-arch-caption&quot; data-arch-caption&gt;&lt;strong&gt;Whole system:&lt;/strong&gt; the ledger preserves what happened; projectors compile what it means now; retrieval proposes context; attention decides whether to act; the relationship layer decides how.&lt;/div&gt;
          &lt;/div&gt;
          &lt;div style=&quot;height:20px&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;rma-table-wrap&quot;&gt;
            &lt;table&gt;
              &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Capability&lt;/th&gt;&lt;th&gt;Supermemory handles&lt;/th&gt;&lt;th&gt;Recall must own&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
              &lt;tbody&gt;
                &lt;tr&gt;&lt;td&gt;Ingestion&lt;/td&gt;&lt;td&gt;Chunking, embeddings, document extraction, semantic indexing&lt;/td&gt;&lt;td&gt;Source trust, consent, redaction, user/space ownership, durable write receipt&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Memory evolution&lt;/td&gt;&lt;td&gt;Candidate relations and useful extraction signals&lt;/td&gt;&lt;td&gt;Typed claims, temporal intervals, contradiction policy, supersession, uncertainty&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Search&lt;/td&gt;&lt;td&gt;High-recall semantic candidates and document lookup&lt;/td&gt;&lt;td&gt;Query intent, applicability, state assembly, provenance, diversification, budgets&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Forgetting&lt;/td&gt;&lt;td&gt;Index-level soft delete where supported&lt;/td&gt;&lt;td&gt;User preview, canonical tombstone, dependency graph, cache/projection purge, audit&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Companion behavior&lt;/td&gt;&lt;td&gt;Nothing—and that is correct&lt;/td&gt;&lt;td&gt;Threads, attention, silence, humor, relationship promises, rupture repair&lt;/td&gt;&lt;/tr&gt;
              &lt;/tbody&gt;
            &lt;/table&gt;
          &lt;/div&gt;
          &lt;div style=&quot;height:28px&quot;&gt;&lt;/div&gt;
          &lt;h3&gt;Component responsibility and failure register&lt;/h3&gt;
          &lt;div class=&quot;rma-table-wrap&quot;&gt;
            &lt;table style=&quot;min-width:980px&quot;&gt;
              &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Component&lt;/th&gt;&lt;th&gt;Purpose / data&lt;/th&gt;&lt;th&gt;Created or updated&lt;/th&gt;&lt;th&gt;Connects to&lt;/th&gt;&lt;th&gt;Primary failure mode&lt;/th&gt;&lt;th&gt;Phase&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
              &lt;tbody&gt;
                &lt;tr&gt;&lt;td&gt;Event ledger&lt;/td&gt;&lt;td&gt;Canonical evidence, timestamps, source, scope, revisions, tombstones&lt;/td&gt;&lt;td&gt;Every trusted observation; append-only transaction&lt;/td&gt;&lt;td&gt;All projectors, audit, export&lt;/td&gt;&lt;td&gt;Lost receipt or mutable history&lt;/td&gt;&lt;td&gt;MVP&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Write broker&lt;/td&gt;&lt;td&gt;Trust, consent, redaction, sensitivity, write routing&lt;/td&gt;&lt;td&gt;Runs before every durable write&lt;/td&gt;&lt;td&gt;Ledger, queue, direct-intent handlers&lt;/td&gt;&lt;td&gt;Poisoning or secret leakage&lt;/td&gt;&lt;td&gt;MVP&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Claims / beliefs&lt;/td&gt;&lt;td&gt;Typed propositions and current/historical temporal state&lt;/td&gt;&lt;td&gt;Async extraction; deterministic projection and replay&lt;/td&gt;&lt;td&gt;Threads, retrieval, dossiers&lt;/td&gt;&lt;td&gt;False certainty, stale current state&lt;/td&gt;&lt;td&gt;MVP&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Prospective store&lt;/td&gt;&lt;td&gt;Future intention, context/date trigger, lifecycle, cooldown&lt;/td&gt;&lt;td&gt;Explicit user intent; action outcome updates&lt;/td&gt;&lt;td&gt;Agenda, context compiler, attention&lt;/td&gt;&lt;td&gt;Premature or repeated firing&lt;/td&gt;&lt;td&gt;MVP&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Life threads&lt;/td&gt;&lt;td&gt;Unfinished situations, expected next event, status, resolution&lt;/td&gt;&lt;td&gt;Belief/event transitions plus explicit close&lt;/td&gt;&lt;td&gt;Views, attention, weekly/monthly&lt;/td&gt;&lt;td&gt;Zombie loops or fabricated closure&lt;/td&gt;&lt;td&gt;P2&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Supermemory index&lt;/td&gt;&lt;td&gt;Documents, chunks, embeddings, semantic/relational candidates&lt;/td&gt;&lt;td&gt;Async mirror and purge from canonical events&lt;/td&gt;&lt;td&gt;Retrieval planner&lt;/td&gt;&lt;td&gt;Index treated as truth; stale metadata&lt;/td&gt;&lt;td&gt;MVP&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Context compiler&lt;/td&gt;&lt;td&gt;Bounded, sourced packet for the current turn&lt;/td&gt;&lt;td&gt;Every response/session opening&lt;/td&gt;&lt;td&gt;Retrieval, attention, generator&lt;/td&gt;&lt;td&gt;Prompt soup, scope leakage, buried obligations&lt;/td&gt;&lt;td&gt;MVP&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Attention engine&lt;/td&gt;&lt;td&gt;Candidate actions, hard gates, utility, cooldown, silence trace&lt;/td&gt;&lt;td&gt;Every eligible moment; outcomes update policy state&lt;/td&gt;&lt;td&gt;Threads, triggers, relationship, response&lt;/td&gt;&lt;td&gt;Intrusion, nagging, unsafe timing&lt;/td&gt;&lt;td&gt;P3 shadow&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Relationship engine&lt;/td&gt;&lt;td&gt;Recall promises, boundaries, dialect, humor, ruptures, repairs&lt;/td&gt;&lt;td&gt;Interaction outcomes and explicit feedback&lt;/td&gt;&lt;td&gt;Attention gates and expression&lt;/td&gt;&lt;td&gt;Sycophancy, drift, fake intimacy, repeated harm&lt;/td&gt;&lt;td&gt;P2/P4&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Derived projections&lt;/td&gt;&lt;td&gt;Dossiers, emotions, routines, week/month, anniversaries&lt;/td&gt;&lt;td&gt;Async replay from events and state&lt;/td&gt;&lt;td&gt;UI, retrieval, attention candidates&lt;/td&gt;&lt;td&gt;Summary drift or projection becoming authority&lt;/td&gt;&lt;td&gt;P2&lt;/td&gt;&lt;/tr&gt;
              &lt;/tbody&gt;
            &lt;/table&gt;
          &lt;/div&gt;
        &lt;/section&gt;

        &lt;section id=&quot;model&quot;&gt;
          &lt;div class=&quot;rma-section-head&quot;&gt;&lt;div class=&quot;rma-index&quot;&gt;04 · Memory model&lt;/div&gt;&lt;div&gt;&lt;h2&gt;Store tellings. Derive beliefs.&lt;/h2&gt;&lt;p&gt;The smallest trustworthy unit is not “a memory”; it is an evidence event plus the claims extracted from it. A belief is a time-bounded interpretation of those claims. A profile is simply a view over beliefs—and can always be rebuilt.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
          &lt;div class=&quot;rma-grid-3&quot;&gt;
            &lt;div class=&quot;rma-card&quot;&gt;&lt;span class=&quot;rma-badge now&quot;&gt;Canonical&lt;/span&gt;&lt;h3&gt;Evidence events&lt;/h3&gt;&lt;p&gt;What was observed or explicitly told, by whom, through which channel, at what story time and record time. Append-only except for user-authorized tombstones.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-card&quot;&gt;&lt;span class=&quot;rma-badge now&quot;&gt;Derived&lt;/span&gt;&lt;h3&gt;Claims + beliefs&lt;/h3&gt;&lt;p&gt;Typed propositions linked to evidence: current preference, meeting date, relationship fact, routine hypothesis. Versioned, scoped, uncertain, rebuildable.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-card&quot;&gt;&lt;span class=&quot;rma-badge next&quot;&gt;Derived&lt;/span&gt;&lt;h3&gt;Continuity objects&lt;/h3&gt;&lt;p&gt;Threads, prospective triggers, dossiers, emotional arcs, routines, week/month narratives, anniversaries. Useful views—not separate truths.&lt;/p&gt;&lt;/div&gt;
          &lt;/div&gt;

          &lt;div style=&quot;height:26px&quot;&gt;&lt;/div&gt;
          &lt;h3&gt;Seven memory families with separate rules&lt;/h3&gt;
          &lt;div class=&quot;rma-table-wrap&quot;&gt;
            &lt;table&gt;
              &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Family&lt;/th&gt;&lt;th&gt;Stores / derives&lt;/th&gt;&lt;th&gt;Creation and update&lt;/th&gt;&lt;th&gt;Primary consumer&lt;/th&gt;&lt;th&gt;Phase&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
              &lt;tbody&gt;
                &lt;tr&gt;&lt;td&gt;Episodic evidence&lt;/td&gt;&lt;td&gt;Events, conversations, observations, document quotes, source and timestamps&lt;/td&gt;&lt;td&gt;Append first; enrich later. Corrections add a new event and relation.&lt;/td&gt;&lt;td&gt;All projectors and audit&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rma-badge now&quot;&gt;MVP&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Semantic beliefs&lt;/td&gt;&lt;td&gt;Current and historical facts/preferences with scope, confidence, valid interval&lt;/td&gt;&lt;td&gt;Project claims; close/supersede intervals when stronger evidence changes truth.&lt;/td&gt;&lt;td&gt;Context compiler, dossiers&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rma-badge now&quot;&gt;MVP&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Prospective memory&lt;/td&gt;&lt;td&gt;Date-based commitments and context-based “next time X” intentions&lt;/td&gt;&lt;td&gt;Explicit user intent; exact trigger first; lifecycle open/fired/snoozed/resolved/cancelled.&lt;/td&gt;&lt;td&gt;Agenda and attention&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rma-badge now&quot;&gt;MVP&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Working memory&lt;/td&gt;&lt;td&gt;Current turn goals, referents, recent tool outcomes, temporary scratch state&lt;/td&gt;&lt;td&gt;Session-scoped; promoted only through the write policy. Expires by design.&lt;/td&gt;&lt;td&gt;Context compiler&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rma-badge now&quot;&gt;MVP&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Pinned memory&lt;/td&gt;&lt;td&gt;User-marked always-known items, safety needs, boundaries, core preferences&lt;/td&gt;&lt;td&gt;Only explicit pin or high-certainty safety policy. User can inspect/unpin.&lt;/td&gt;&lt;td&gt;Every eligible session&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rma-badge now&quot;&gt;MVP&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Emotional continuity&lt;/td&gt;&lt;td&gt;Episode-level affect and cautious time-window hypotheses—not traits&lt;/td&gt;&lt;td&gt;Text evidence first; decay and require recurrence. Voice prosody is corroborating evidence later.&lt;/td&gt;&lt;td&gt;Moment regulation, weekly view&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rma-badge next&quot;&gt;P2&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Relationship memory&lt;/td&gt;&lt;td&gt;Shared moments, Recall promises, corrections, jokes, boundaries, ruptures, repairs&lt;/td&gt;&lt;td&gt;Separate ledger keyed to Recall↔user interaction; never merged into user traits.&lt;/td&gt;&lt;td&gt;Personality, humor, repair&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rma-badge next&quot;&gt;P2/P3&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Agent procedural&lt;/td&gt;&lt;td&gt;Behavioral lessons: “do not tease here,” “confirm before changing,” failure preventions&lt;/td&gt;&lt;td&gt;Explicit policy or validated repair outcome; versioned with the agent/persona.&lt;/td&gt;&lt;td&gt;Attention and response policy&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rma-badge later&quot;&gt;P3&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
              &lt;/tbody&gt;
            &lt;/table&gt;
          &lt;/div&gt;
          &lt;p class=&quot;rma-note&quot; style=&quot;margin-top:10px&quot;&gt;The last two are intentionally separate: a user fact says “Mahmoud dislikes repeated reminders.” A relationship lesson says “Recall repeated a reminder twice and promised to stop.” A procedural rule says “cap non-urgent reminders at one unless reopened.”&lt;/p&gt;

          &lt;div style=&quot;height:32px&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;rma-grid-2&quot;&gt;
            &lt;div&gt;
              &lt;h3&gt;The canonical typed contract&lt;/h3&gt;
              &lt;div class=&quot;rma-code&quot;&gt;
                &lt;div class=&quot;rma-code-head&quot;&gt;&lt;span&gt;memory-contract.ts · condensed&lt;/span&gt;&lt;button class=&quot;rma-copy&quot; type=&quot;button&quot;&gt;Copy&lt;/button&gt;&lt;/div&gt;
                &lt;pre&gt;&lt;span class=&quot;tok-k&quot;&gt;type&lt;/span&gt; &lt;span class=&quot;tok-t&quot;&gt;TrustTier&lt;/span&gt; =
  | &lt;span class=&quot;tok-s&quot;&gt;&quot;user_direct&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;user_approved&quot;&lt;/span&gt;
  | &lt;span class=&quot;tok-s&quot;&gt;&quot;recall_observation&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;tool_output&quot;&lt;/span&gt;
  | &lt;span class=&quot;tok-s&quot;&gt;&quot;external_content&quot;&lt;/span&gt;;

&lt;span class=&quot;tok-k&quot;&gt;interface&lt;/span&gt; &lt;span class=&quot;tok-t&quot;&gt;MemoryEvent&lt;/span&gt; {
  id: &lt;span class=&quot;tok-t&quot;&gt;UUID&lt;/span&gt;; userId: &lt;span class=&quot;tok-t&quot;&gt;UUID&lt;/span&gt;;
  space: &lt;span class=&quot;tok-s&quot;&gt;&quot;personal&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;work&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;health&quot;&lt;/span&gt;;
  kind: &lt;span class=&quot;tok-s&quot;&gt;&quot;utterance&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;document_quote&quot;&lt;/span&gt;
      | &lt;span class=&quot;tok-s&quot;&gt;&quot;observation&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;correction&quot;&lt;/span&gt;
      | &lt;span class=&quot;tok-s&quot;&gt;&quot;consent&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;deletion&quot;&lt;/span&gt;;
  payload: &lt;span class=&quot;tok-t&quot;&gt;EncryptedJSON&lt;/span&gt;; payloadHash: &lt;span class=&quot;tok-t&quot;&gt;SHA256&lt;/span&gt;;
  source: { channel: &lt;span class=&quot;tok-t&quot;&gt;Channel&lt;/span&gt;; actor: &lt;span class=&quot;tok-t&quot;&gt;Actor&lt;/span&gt;;
            trust: &lt;span class=&quot;tok-t&quot;&gt;TrustTier&lt;/span&gt;; sourceId?: &lt;span class=&quot;tok-t&quot;&gt;UUID&lt;/span&gt; };
  recordedAt: &lt;span class=&quot;tok-t&quot;&gt;Instant&lt;/span&gt;;  &lt;span class=&quot;tok-c&quot;&gt;// system knew it&lt;/span&gt;
  storyTime?: &lt;span class=&quot;tok-t&quot;&gt;TimeRange&lt;/span&gt;; &lt;span class=&quot;tok-c&quot;&gt;// it was true/happened&lt;/span&gt;
  sensitivity: &lt;span class=&quot;tok-t&quot;&gt;Sensitivity&lt;/span&gt;;
  revisionOf?: &lt;span class=&quot;tok-t&quot;&gt;UUID&lt;/span&gt;; tombstonedAt?: &lt;span class=&quot;tok-t&quot;&gt;Instant&lt;/span&gt;;
}

&lt;span class=&quot;tok-k&quot;&gt;interface&lt;/span&gt; &lt;span class=&quot;tok-t&quot;&gt;Claim&lt;/span&gt; {
  id: &lt;span class=&quot;tok-t&quot;&gt;UUID&lt;/span&gt;; eventId: &lt;span class=&quot;tok-t&quot;&gt;UUID&lt;/span&gt;;
  subject: &lt;span class=&quot;tok-t&quot;&gt;EntityRef&lt;/span&gt;; predicate: &lt;span class=&quot;tok-t&quot;&gt;Predicate&lt;/span&gt;;
  object: &lt;span class=&quot;tok-t&quot;&gt;TypedValue&lt;/span&gt;; polarity: &lt;span class=&quot;tok-n&quot;&gt;1&lt;/span&gt; | &lt;span class=&quot;tok-n&quot;&gt;-1&lt;/span&gt;;
  scope?: &lt;span class=&quot;tok-t&quot;&gt;ApplicabilityScope&lt;/span&gt;;
  modality: &lt;span class=&quot;tok-s&quot;&gt;&quot;asserted&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;hedged&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;inferred&quot;&lt;/span&gt;;
  validTime?: &lt;span class=&quot;tok-t&quot;&gt;TimeRange&lt;/span&gt;; extractorVersion: &lt;span class=&quot;tok-t&quot;&gt;string&lt;/span&gt;;
}

&lt;span class=&quot;tok-k&quot;&gt;interface&lt;/span&gt; &lt;span class=&quot;tok-t&quot;&gt;Belief&lt;/span&gt; {
  key: &lt;span class=&quot;tok-t&quot;&gt;BeliefKey&lt;/span&gt;; value: &lt;span class=&quot;tok-t&quot;&gt;TypedValue&lt;/span&gt;;
  status: &lt;span class=&quot;tok-s&quot;&gt;&quot;current&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;historical&quot;&lt;/span&gt;
        | &lt;span class=&quot;tok-s&quot;&gt;&quot;conflicting&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;unknown&quot;&lt;/span&gt;;
  confidence: &lt;span class=&quot;tok-s&quot;&gt;&quot;direct&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;strong&quot;&lt;/span&gt;
            | &lt;span class=&quot;tok-s&quot;&gt;&quot;tentative&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;conflicting&quot;&lt;/span&gt;;
  validTime: &lt;span class=&quot;tok-t&quot;&gt;TimeRange&lt;/span&gt;; systemTime: &lt;span class=&quot;tok-t&quot;&gt;TimeRange&lt;/span&gt;;
  scope: &lt;span class=&quot;tok-t&quot;&gt;ApplicabilityScope&lt;/span&gt;;
  support: &lt;span class=&quot;tok-t&quot;&gt;ClaimID&lt;/span&gt;[]; opposition: &lt;span class=&quot;tok-t&quot;&gt;ClaimID&lt;/span&gt;[];
  projectorVersion: &lt;span class=&quot;tok-t&quot;&gt;string&lt;/span&gt;;
}&lt;/pre&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div&gt;
              &lt;h3&gt;The separations that prevent drift&lt;/h3&gt;
              &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;A&lt;/div&gt;&lt;div&gt;&lt;b&gt;User memory ≠ relationship memory&lt;/b&gt;&lt;p&gt;Facts about the user never silently become facts about the bond, and Recall’s mistake never becomes a negative user trait.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;B&lt;/div&gt;&lt;div&gt;&lt;b&gt;Relationship memory ≠ procedural policy&lt;/b&gt;&lt;p&gt;A rupture is evidence. A new behavioral rule is an explicit, versioned response to that evidence.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;C&lt;/div&gt;&lt;div&gt;&lt;b&gt;Episode emotion ≠ personality trait&lt;/b&gt;&lt;p&gt;“Frustrated today” expires. “Often anxious before investor calls” remains a tentative pattern until repeated and useful.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;D&lt;/div&gt;&lt;div&gt;&lt;b&gt;Retrieved ≠ applicable&lt;/b&gt;&lt;p&gt;A 2024 preference can be semantically relevant and still wrong for 2026, the current space, or this situation.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;E&lt;/div&gt;&lt;div&gt;&lt;b&gt;Summary ≠ evidence&lt;/b&gt;&lt;p&gt;Dossiers, profiles, briefings, and weekly narratives are cached projections. Delete them freely; rebuild them deterministically.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-callout&quot;&gt;&lt;strong&gt;Confidence stays linguistic.&lt;/strong&gt; Use direct, strong, tentative, conflicting, and unknown. Do not imply scientific calibration with arbitrary decimals. Internal scores can rank candidates; user-facing claims must express honest uncertainty.&lt;/div&gt;
            &lt;/div&gt;
          &lt;/div&gt;

          &lt;div style=&quot;height:34px&quot;&gt;&lt;/div&gt;
          &lt;h3&gt;Time is four different questions&lt;/h3&gt;
          &lt;div class=&quot;rma-timeline&quot;&gt;
            &lt;div class=&quot;rma-time&quot;&gt;&lt;b&gt;Story / valid time&lt;/b&gt;&lt;p&gt;When did the event happen or the claim hold? “The meeting is on July 27.”&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-time&quot;&gt;&lt;b&gt;Recorded / system time&lt;/b&gt;&lt;p&gt;When did Recall learn it? A late telling must not rewrite history as if known earlier.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-time&quot;&gt;&lt;b&gt;Due / expected time&lt;/b&gt;&lt;p&gt;When is action or the next development expected? Used by commitments and threads.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-time&quot;&gt;&lt;b&gt;Activation time&lt;/b&gt;&lt;p&gt;When did a context trigger match, fire, snooze, or cool down?&lt;/p&gt;&lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;rma-callout&quot;&gt;&lt;strong&gt;Query semantics:&lt;/strong&gt; “What is true now?” selects the belief whose valid interval contains now. “What did I tell you last?” orders by recorded time. “What was true in June?” selects valid time. “How did this change?” returns the complete evidence chain. Never use one timestamp to answer all four.&lt;/div&gt;
        &lt;/section&gt;
        &lt;section id=&quot;write&quot;&gt;
          &lt;div class=&quot;rma-section-head&quot;&gt;&lt;div class=&quot;rma-index&quot;&gt;05 · Write &amp; consolidation&lt;/div&gt;&lt;div&gt;&lt;h2&gt;Fast receipt. Slow understanding.&lt;/h2&gt;&lt;p&gt;The write path separates the one thing that must never fail—the evidence receipt—from richer interpretation that can retry. Recall can feel instant without making truth depend on an LLM call.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
          &lt;div class=&quot;rma-tabs&quot; role=&quot;tablist&quot; aria-label=&quot;Memory flows&quot;&gt;
            &lt;button class=&quot;rma-tab active&quot; data-group=&quot;flows&quot; data-tab=&quot;write&quot;&gt;Write&lt;/button&gt;&lt;button class=&quot;rma-tab&quot; data-group=&quot;flows&quot; data-tab=&quot;consolidate&quot;&gt;Consolidate&lt;/button&gt;&lt;button class=&quot;rma-tab&quot; data-group=&quot;flows&quot; data-tab=&quot;conflict&quot;&gt;Conflict&lt;/button&gt;&lt;button class=&quot;rma-tab&quot; data-group=&quot;flows&quot; data-tab=&quot;delete&quot;&gt;Correction / deletion&lt;/button&gt;
          &lt;/div&gt;
          &lt;div class=&quot;rma-tab-panel active&quot; data-group=&quot;flows&quot; data-panel=&quot;write&quot;&gt;
            &lt;div class=&quot;rma-flow&quot;&gt;
              &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;0 · source&lt;/small&gt;&lt;b&gt;User says it&lt;/b&gt;&lt;p&gt;Voice, text, or approved document selection.&lt;/p&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;1 · gate&lt;/small&gt;&lt;b&gt;Trust + redact&lt;/b&gt;&lt;p&gt;Actor, space, sensitivity, secrets, instruction quarantine.&lt;/p&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;2 · sync&lt;/small&gt;&lt;b&gt;Append event&lt;/b&gt;&lt;p&gt;Transactional local write; return durable event ID.&lt;/p&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;3 · fast path&lt;/small&gt;&lt;b&gt;Direct intent&lt;/b&gt;&lt;p&gt;Pin, correction, commitment, delete, prospective trigger.&lt;/p&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;4 · queue&lt;/small&gt;&lt;b&gt;Enrich&lt;/b&gt;&lt;p&gt;Claims, entities, time, emotion, novelty, relations.&lt;/p&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;5 · project&lt;/small&gt;&lt;b&gt;Update state&lt;/b&gt;&lt;p&gt;Beliefs, threads, triggers, relationship ledger.&lt;/p&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;6 · index&lt;/small&gt;&lt;b&gt;Mirror&lt;/b&gt;&lt;p&gt;Supermemory embedding and semantic document index.&lt;/p&gt;&lt;/div&gt;
            &lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;rma-tab-panel&quot; data-group=&quot;flows&quot; data-panel=&quot;consolidate&quot;&gt;
            &lt;div class=&quot;rma-grid-3&quot;&gt;
              &lt;div class=&quot;rma-card&quot;&gt;&lt;span class=&quot;rma-badge now&quot;&gt;Input&lt;/span&gt;&lt;h4&gt;Evidence window&lt;/h4&gt;&lt;p&gt;New events plus relevant old claims, unresolved threads, current belief state, and projector version. Never a summary of a summary.&lt;/p&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-card&quot;&gt;&lt;span class=&quot;rma-badge now&quot;&gt;Operation&lt;/span&gt;&lt;h4&gt;Candidate projection&lt;/h4&gt;&lt;p&gt;Extract claims, resolve entities, classify relation, infer cautious patterns, then validate every output against a typed schema.&lt;/p&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-card&quot;&gt;&lt;span class=&quot;rma-badge now&quot;&gt;Output&lt;/span&gt;&lt;h4&gt;Rebuildable state&lt;/h4&gt;&lt;p&gt;Close/open belief intervals, update thread state, queue derived views, and log provenance. On failure, leave evidence intact and retry.&lt;/p&gt;&lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;rma-callout&quot;&gt;&lt;strong&gt;Consolidation is never destructive.&lt;/strong&gt; It can promote a tentative pattern, split an entity, merge aliases, or close an interval—but it cannot alter the source event. Every projector stores its version so a migration can replay history from scratch.&lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;rma-tab-panel&quot; data-group=&quot;flows&quot; data-panel=&quot;conflict&quot;&gt;
            &lt;div class=&quot;rma-grid-2&quot;&gt;
              &lt;div class=&quot;rma-card&quot;&gt;&lt;h4&gt;Candidate relation classifier&lt;/h4&gt;&lt;p&gt;&lt;strong style=&quot;color:var(--ink)&quot;&gt;supports&lt;/strong&gt; same proposition; &lt;strong style=&quot;color:var(--ink)&quot;&gt;extends&lt;/strong&gt; adds compatible detail; &lt;strong style=&quot;color:var(--ink)&quot;&gt;contradicts&lt;/strong&gt; incompatible values or polarity; &lt;strong style=&quot;color:var(--ink)&quot;&gt;supersedes&lt;/strong&gt; explicit change with later valid time; &lt;strong style=&quot;color:var(--ink)&quot;&gt;unrelated&lt;/strong&gt; lexical similarity without shared predicate/scope.&lt;/p&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-card&quot;&gt;&lt;h4&gt;Decision order&lt;/h4&gt;&lt;p&gt;Exact entity + normalized predicate + overlapping scope/time first. Explicit correction/change language outranks similarity. Direct user evidence outranks inference. If valid time is unclear, preserve both and mark conflicting—do not guess.&lt;/p&gt;&lt;/div&gt;
            &lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;rma-tab-panel&quot; data-group=&quot;flows&quot; data-panel=&quot;delete&quot;&gt;
            &lt;div class=&quot;rma-flow&quot; style=&quot;grid-template-columns:repeat(6,1fr)&quot;&gt;
              &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;1&lt;/small&gt;&lt;b&gt;Preview&lt;/b&gt;&lt;p&gt;Show exact events, beliefs, projections, and triggers affected.&lt;/p&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;2&lt;/small&gt;&lt;b&gt;Authorize&lt;/b&gt;&lt;p&gt;User confirms scope: this telling, this belief, or entire topic.&lt;/p&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;3&lt;/small&gt;&lt;b&gt;Tombstone&lt;/b&gt;&lt;p&gt;Canonical event becomes inaccessible; audit keeps minimal proof.&lt;/p&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;4&lt;/small&gt;&lt;b&gt;Cascade&lt;/b&gt;&lt;p&gt;Invalidate dependent claims, beliefs, threads, summaries, triggers.&lt;/p&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;5&lt;/small&gt;&lt;b&gt;Purge&lt;/b&gt;&lt;p&gt;Supermemory index, caches, embeddings, exported derived artifacts.&lt;/p&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;6&lt;/small&gt;&lt;b&gt;Rebuild&lt;/b&gt;&lt;p&gt;Replay remaining evidence; report completion or residual constraints.&lt;/p&gt;&lt;/div&gt;
            &lt;/div&gt;
          &lt;/div&gt;

          &lt;div style=&quot;height:30px&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;rma-grid-2&quot;&gt;
            &lt;div&gt;
              &lt;h3&gt;What earns a durable write?&lt;/h3&gt;
              &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;01&lt;/div&gt;&lt;div&gt;&lt;b&gt;Explicit memory intent&lt;/b&gt;&lt;p&gt;“Remember this,” “pin this,” corrections, deletions, and boundaries always enter the fast path.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;02&lt;/div&gt;&lt;div&gt;&lt;b&gt;Future obligation&lt;/b&gt;&lt;p&gt;Commitments, promises, due dates, and “next time” intentions require state and lifecycle—not just an episode.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;03&lt;/div&gt;&lt;div&gt;&lt;b&gt;Prediction error / change&lt;/b&gt;&lt;p&gt;A changed date, preference, relationship, plan, or negation is more informative than another repetition.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;04&lt;/div&gt;&lt;div&gt;&lt;b&gt;Unfinished or recurring&lt;/b&gt;&lt;p&gt;Open loops and repeated patterns may create a thread or tentative routine after enough evidence.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;05&lt;/div&gt;&lt;div&gt;&lt;b&gt;Emotional or relational significance&lt;/b&gt;&lt;p&gt;Store the episode and context. Derive lasting meaning only after evidence accumulates.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
            &lt;/div&gt;
            &lt;div&gt;
              &lt;h3&gt;Sync versus async&lt;/h3&gt;
              &lt;div class=&quot;rma-table-wrap&quot;&gt;
                &lt;table style=&quot;min-width:520px&quot;&gt;
                  &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Synchronous&lt;/th&gt;&lt;th&gt;Asynchronous&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
                  &lt;tbody&gt;
                    &lt;tr&gt;&lt;td&gt;Source/trust classification&lt;/td&gt;&lt;td&gt;LLM claim extraction&lt;/td&gt;&lt;/tr&gt;
                    &lt;tr&gt;&lt;td&gt;Local secret redaction&lt;/td&gt;&lt;td&gt;Entity resolution / alias merge&lt;/td&gt;&lt;/tr&gt;
                    &lt;tr&gt;&lt;td&gt;Append event + receipt&lt;/td&gt;&lt;td&gt;Embedding / Supermemory mirror&lt;/td&gt;&lt;/tr&gt;
                    &lt;tr&gt;&lt;td&gt;Explicit pin/delete/correction intent&lt;/td&gt;&lt;td&gt;Belief and thread projection&lt;/td&gt;&lt;/tr&gt;
                    &lt;tr&gt;&lt;td&gt;Deterministic date/trigger fast path&lt;/td&gt;&lt;td&gt;Emotion, routine, dossier updates&lt;/td&gt;&lt;/tr&gt;
                    &lt;tr&gt;&lt;td&gt;Minimal context needed for this reply&lt;/td&gt;&lt;td&gt;Night Shift, weekly/monthly narratives&lt;/td&gt;&lt;/tr&gt;
                  &lt;/tbody&gt;
                &lt;/table&gt;
              &lt;/div&gt;
              &lt;div class=&quot;rma-callout&quot;&gt;&lt;strong&gt;Latency contract:&lt;/strong&gt; acknowledge only after the event is durable. Target &amp;lt;100 ms local append. Enrichment may finish later; the UI shows “captured” separately from “understood.”&lt;/div&gt;
            &lt;/div&gt;
          &lt;/div&gt;

          &lt;div style=&quot;height:30px&quot;&gt;&lt;/div&gt;
          &lt;h3&gt;Conflict, correction, and staleness rules&lt;/h3&gt;
          &lt;div class=&quot;rma-grid-3&quot;&gt;
            &lt;div class=&quot;rma-card&quot;&gt;&lt;h4&gt;1 · Preserve&lt;/h4&gt;&lt;p&gt;Never silently replace evidence. Append the new telling and link it to the prior event with &lt;code&gt;corrects&lt;/code&gt;, &lt;code&gt;supersedes&lt;/code&gt;, or &lt;code&gt;contradicts&lt;/code&gt;.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-card&quot;&gt;&lt;h4&gt;2 · Compile&lt;/h4&gt;&lt;p&gt;Current state uses valid time, scope, directness, explicit change language, and recency. Recorded time only answers “what was told last.”&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-card&quot;&gt;&lt;h4&gt;3 · Admit uncertainty&lt;/h4&gt;&lt;p&gt;If two direct tellings overlap without a clear correction, status becomes conflicting. Recall asks or speaks tentatively instead of picking a winner.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-card&quot;&gt;&lt;h4&gt;4 · Decay applicability&lt;/h4&gt;&lt;p&gt;Inferred patterns weaken with disconfirming evidence, context change, or long inactivity. Direct historical facts do not “decay”; their present applicability does.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-card&quot;&gt;&lt;h4&gt;5 · Scope preferences&lt;/h4&gt;&lt;p&gt;“I hate calls” may mean investor calls, calls during focus time, or all calls. Prefer the narrowest evidence-supported scope.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-card&quot;&gt;&lt;h4&gt;6 · Rebuild on delete&lt;/h4&gt;&lt;p&gt;User deletion removes the evidence from every projection and index. A derived belief with no remaining support disappears; no ghost summary survives.&lt;/p&gt;&lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;rma-callout&quot;&gt;&lt;strong&gt;Abstract staleness principle:&lt;/strong&gt; the past remains active while it still explains the present. It becomes historical when newer correction, changed circumstances, contrary behavior, expired scope, or prolonged non-use weakens its applicability. Preserve it as history; stop presenting it as now.&lt;/div&gt;
        &lt;/section&gt;

        &lt;section id=&quot;retrieval&quot;&gt;
          &lt;div class=&quot;rma-section-head&quot;&gt;&lt;div class=&quot;rma-index&quot;&gt;06 · Retrieval &amp; context&lt;/div&gt;&lt;div&gt;&lt;h2&gt;Recall less. Compile better.&lt;/h2&gt;&lt;p&gt;Retrieval is high-recall candidate generation; context compilation is a stateful, policy-aware decision. The final prompt should be small, typed, and explicit about why each item is present.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
          &lt;div class=&quot;rma-flow&quot;&gt;
            &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;1&lt;/small&gt;&lt;b&gt;Understand turn&lt;/b&gt;&lt;p&gt;Intent, entities, time mode, space, sensitivity, task.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;2&lt;/small&gt;&lt;b&gt;Generate&lt;/b&gt;&lt;p&gt;Semantic, lexical, entity, temporal, graph, trigger candidates.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;3&lt;/small&gt;&lt;b&gt;Trust filter&lt;/b&gt;&lt;p&gt;Tenant, space, consent, source tier, tombstones.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;4&lt;/small&gt;&lt;b&gt;Assemble state&lt;/b&gt;&lt;p&gt;Current belief vs historical evidence vs conflict chain.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;5&lt;/small&gt;&lt;b&gt;Applicability&lt;/b&gt;&lt;p&gt;Time, scope, confidence, current task and mood.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;6&lt;/small&gt;&lt;b&gt;Diversify&lt;/b&gt;&lt;p&gt;Avoid five variants of the same memory; keep provenance.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;7&lt;/small&gt;&lt;b&gt;Compile&lt;/b&gt;&lt;p&gt;Fill bounded slots and expose uncertainty.&lt;/p&gt;&lt;/div&gt;
          &lt;/div&gt;

          &lt;div style=&quot;height:32px&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;rma-grid-2&quot;&gt;
            &lt;div&gt;
              &lt;h3&gt;The context packet&lt;/h3&gt;
              &lt;div class=&quot;rma-code&quot;&gt;
                &lt;div class=&quot;rma-code-head&quot;&gt;&lt;span&gt;compiled-context.ts&lt;/span&gt;&lt;button class=&quot;rma-copy&quot; type=&quot;button&quot;&gt;Copy&lt;/button&gt;&lt;/div&gt;
                &lt;pre&gt;&lt;span class=&quot;tok-k&quot;&gt;interface&lt;/span&gt; &lt;span class=&quot;tok-t&quot;&gt;CompiledContext&lt;/span&gt; {
  safety: &lt;span class=&quot;tok-t&quot;&gt;PinnedItem&lt;/span&gt;[];       &lt;span class=&quot;tok-c&quot;&gt;// hard constraints&lt;/span&gt;
  relationship: {
    activeRupture?: &lt;span class=&quot;tok-t&quot;&gt;Rupture&lt;/span&gt;;
    promisesDue: &lt;span class=&quot;tok-t&quot;&gt;AgentPromise&lt;/span&gt;[];
    dialect: &lt;span class=&quot;tok-t&quot;&gt;RelationshipDialect&lt;/span&gt;;
  };
  working: &lt;span class=&quot;tok-t&quot;&gt;WorkingState&lt;/span&gt;;      &lt;span class=&quot;tok-c&quot;&gt;// this conversation&lt;/span&gt;
  activeThreads: &lt;span class=&quot;tok-t&quot;&gt;ThreadState&lt;/span&gt;[];
  currentBeliefs: &lt;span class=&quot;tok-t&quot;&gt;GroundedBelief&lt;/span&gt;[];
  historicalEvidence: &lt;span class=&quot;tok-t&quot;&gt;EvidenceRef&lt;/span&gt;[];
  prospective: &lt;span class=&quot;tok-t&quot;&gt;TriggerMatch&lt;/span&gt;[];
  attentionCandidates: &lt;span class=&quot;tok-t&quot;&gt;AttentionCandidate&lt;/span&gt;[];
  uncertainty: &lt;span class=&quot;tok-t&quot;&gt;ConflictOrGap&lt;/span&gt;[];
  budget: { usedTokens: &lt;span class=&quot;tok-t&quot;&gt;number&lt;/span&gt;; maxTokens: &lt;span class=&quot;tok-t&quot;&gt;number&lt;/span&gt; };
}&lt;/pre&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div&gt;
              &lt;h3&gt;Slot priority and budget&lt;/h3&gt;
              &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;P0&lt;/div&gt;&lt;div&gt;&lt;b&gt;Safety, consent, active repair&lt;/b&gt;&lt;p&gt;Never displaced. A privacy boundary or unresolved rupture outranks charm.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;P1&lt;/div&gt;&lt;div&gt;&lt;b&gt;Working memory + explicit pins&lt;/b&gt;&lt;p&gt;Current task, referents, requested always-known items, critical accommodations.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;P2&lt;/div&gt;&lt;div&gt;&lt;b&gt;Due obligations and matched triggers&lt;/b&gt;&lt;p&gt;Open commitments, Recall promises, context trigger matches, urgent thread changes.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;P3&lt;/div&gt;&lt;div&gt;&lt;b&gt;Applicable beliefs and evidence&lt;/b&gt;&lt;p&gt;Current state first; history only when needed to explain change or answer the question.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;P4&lt;/div&gt;&lt;div&gt;&lt;b&gt;Relational color&lt;/b&gt;&lt;p&gt;Shared references, gentle callbacks, anniversaries, and weak patterns—only if budget remains.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
            &lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;rma-equation&quot; style=&quot;margin-top:25px&quot;&gt;candidate relevance ≠ conversational applicability&lt;br&gt;applicable = relevant ∩ valid-now ∩ right-scope ∩ trusted ∩ permitted ∩ useful-for-this-turn&lt;/div&gt;
          &lt;div class=&quot;rma-callout&quot;&gt;&lt;strong&gt;Compiler output is inspectable.&lt;/strong&gt; Each item carries &lt;code&gt;whyIncluded&lt;/code&gt;, evidence IDs, valid time, scope, confidence, sensitivity, and whether the generator may assert, hedge, ask, or only use it silently for tone.&lt;/div&gt;
        &lt;/section&gt;
        &lt;section id=&quot;threads&quot;&gt;
          &lt;div class=&quot;rma-section-head&quot;&gt;&lt;div class=&quot;rma-index&quot;&gt;07 · Threads &amp; projections&lt;/div&gt;&lt;div&gt;&lt;h2&gt;Remember the situation, not just the sentence.&lt;/h2&gt;&lt;p&gt;Facts give Recall knowledge. Threads give it continuity. A thread is an unresolved situation with participants, state, expected next development, evidence, and a clear way to end.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
          &lt;div class=&quot;rma-grid-2&quot;&gt;
            &lt;div class=&quot;rma-code&quot;&gt;
              &lt;div class=&quot;rma-code-head&quot;&gt;&lt;span&gt;life-thread.ts&lt;/span&gt;&lt;button class=&quot;rma-copy&quot; type=&quot;button&quot;&gt;Copy&lt;/button&gt;&lt;/div&gt;
              &lt;pre&gt;&lt;span class=&quot;tok-k&quot;&gt;interface&lt;/span&gt; &lt;span class=&quot;tok-t&quot;&gt;LifeThread&lt;/span&gt; {
  id: &lt;span class=&quot;tok-t&quot;&gt;UUID&lt;/span&gt;; title: &lt;span class=&quot;tok-t&quot;&gt;string&lt;/span&gt;;
  kind: &lt;span class=&quot;tok-s&quot;&gt;&quot;decision&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;project&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;relationship&quot;&lt;/span&gt;
      | &lt;span class=&quot;tok-s&quot;&gt;&quot;health&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;place&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;routine&quot;&lt;/span&gt;
      | &lt;span class=&quot;tok-s&quot;&gt;&quot;goal&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;problem&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;waiting&quot;&lt;/span&gt;;
  status: &lt;span class=&quot;tok-s&quot;&gt;&quot;emerging&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;open&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;waiting&quot;&lt;/span&gt;
        | &lt;span class=&quot;tok-s&quot;&gt;&quot;blocked&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;resolved&quot;&lt;/span&gt; | &lt;span class=&quot;tok-s&quot;&gt;&quot;dormant&quot;&lt;/span&gt;;
  currentState: &lt;span class=&quot;tok-t&quot;&gt;GroundedText&lt;/span&gt;;
  participants: &lt;span class=&quot;tok-t&quot;&gt;EntityRef&lt;/span&gt;[];
  commitments: &lt;span class=&quot;tok-t&quot;&gt;CommitmentRef&lt;/span&gt;[];
  expectedNext?: { event: &lt;span class=&quot;tok-t&quot;&gt;string&lt;/span&gt;; by?: &lt;span class=&quot;tok-t&quot;&gt;TimeRange&lt;/span&gt; };
  lastMeaningfulChangeAt: &lt;span class=&quot;tok-t&quot;&gt;Instant&lt;/span&gt;;
  nextReviewAt?: &lt;span class=&quot;tok-t&quot;&gt;Instant&lt;/span&gt;;
  evidence: &lt;span class=&quot;tok-t&quot;&gt;EventID&lt;/span&gt;[];
  resolution?: { eventId: &lt;span class=&quot;tok-t&quot;&gt;EventID&lt;/span&gt;; reason: &lt;span class=&quot;tok-t&quot;&gt;string&lt;/span&gt; };
}&lt;/pre&gt;
            &lt;/div&gt;
            &lt;div&gt;
              &lt;h3&gt;A thread is broader than a person&lt;/h3&gt;
              &lt;div class=&quot;rma-grid-3&quot;&gt;
                &lt;div class=&quot;rma-card&quot;&gt;&lt;h4&gt;People&lt;/h4&gt;&lt;p&gt;Layla, family, collaborator dynamics, promises, last contact.&lt;/p&gt;&lt;/div&gt;
                &lt;div class=&quot;rma-card&quot;&gt;&lt;h4&gt;Places&lt;/h4&gt;&lt;p&gt;Vienna trip, home search, recurring context at a café or office.&lt;/p&gt;&lt;/div&gt;
                &lt;div class=&quot;rma-card&quot;&gt;&lt;h4&gt;Projects&lt;/h4&gt;&lt;p&gt;Recall launch, investor pitch, design decision, blocked dependency.&lt;/p&gt;&lt;/div&gt;
                &lt;div class=&quot;rma-card&quot;&gt;&lt;h4&gt;Routines&lt;/h4&gt;&lt;p&gt;Sleep, gym, Sunday planning—tentative until recurring.&lt;/p&gt;&lt;/div&gt;
                &lt;div class=&quot;rma-card&quot;&gt;&lt;h4&gt;Goals / health&lt;/h4&gt;&lt;p&gt;Desired change, symptoms, care plan, progress—with strict sensitivity.&lt;/p&gt;&lt;/div&gt;
                &lt;div class=&quot;rma-card&quot;&gt;&lt;h4&gt;Waiting states&lt;/h4&gt;&lt;p&gt;Reply, result, delivery, decision, external event that should return.&lt;/p&gt;&lt;/div&gt;
              &lt;/div&gt;
              &lt;div class=&quot;rma-callout&quot;&gt;&lt;strong&gt;Closure matters.&lt;/strong&gt; Threads close only from explicit resolution, fulfilled/cancelled commitments, or high-confidence evidence that the situation ended. Inactivity makes a thread dormant; it does not fabricate resolution.&lt;/div&gt;
            &lt;/div&gt;
          &lt;/div&gt;

          &lt;div style=&quot;height:34px&quot;&gt;&lt;/div&gt;
          &lt;h3&gt;One state model, many human views&lt;/h3&gt;
          &lt;div class=&quot;rma-table-wrap&quot;&gt;
            &lt;table&gt;
              &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Projection&lt;/th&gt;&lt;th&gt;Question answered&lt;/th&gt;&lt;th&gt;Built from&lt;/th&gt;&lt;th&gt;Write-back rule&lt;/th&gt;&lt;th&gt;Phase&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
              &lt;tbody&gt;
                &lt;tr&gt;&lt;td&gt;People dossier&lt;/td&gt;&lt;td&gt;“What is going on with Layla?”&lt;/td&gt;&lt;td&gt;Entity-linked episodes, beliefs, shared history, open threads, commitments, relationship changes&lt;/td&gt;&lt;td&gt;Never writes facts; edits create corrections to source/beliefs&lt;/td&gt;&lt;td&gt;P2&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Place / project dossier&lt;/td&gt;&lt;td&gt;“What has Vienna / Recall become?”&lt;/td&gt;&lt;td&gt;Same machinery, different entity kind and predicates&lt;/td&gt;&lt;td&gt;Projection only&lt;/td&gt;&lt;td&gt;P2&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Weekly constellation&lt;/td&gt;&lt;td&gt;“Take me through my week.”&lt;/td&gt;&lt;td&gt;Story-time and told-time events, changes, people, emotions, decisions, threads&lt;/td&gt;&lt;td&gt;Narrative cache only; sources linked&lt;/td&gt;&lt;td&gt;P2&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Monthly arc&lt;/td&gt;&lt;td&gt;“What shifted this month?”&lt;/td&gt;&lt;td&gt;Week clusters, current-vs-start state, resolved/open threads, recurring patterns&lt;/td&gt;&lt;td&gt;Narrative cache only&lt;/td&gt;&lt;td&gt;P2&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Returning past&lt;/td&gt;&lt;td&gt;“What happened a year/month ago today?”&lt;/td&gt;&lt;td&gt;Deterministic story-date query plus applicability/sensitivity gate&lt;/td&gt;&lt;td&gt;No write unless user reacts meaningfully&lt;/td&gt;&lt;td&gt;Exists → harden&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Emotional arc&lt;/td&gt;&lt;td&gt;“How did my feeling about this change?”&lt;/td&gt;&lt;td&gt;Episode affect, language markers, explicit statements; prosody later&lt;/td&gt;&lt;td&gt;Hypothesis with decay, never permanent trait by default&lt;/td&gt;&lt;td&gt;P2/P4&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Routine hypothesis&lt;/td&gt;&lt;td&gt;“Is this actually a pattern?”&lt;/td&gt;&lt;td&gt;Repeated time/entity/action observations with counterexamples&lt;/td&gt;&lt;td&gt;Starts tentative; promote only after recurrence or confirmation&lt;/td&gt;&lt;td&gt;P2&lt;/td&gt;&lt;/tr&gt;
              &lt;/tbody&gt;
            &lt;/table&gt;
          &lt;/div&gt;
          &lt;div class=&quot;rma-callout&quot;&gt;&lt;strong&gt;Weekly and monthly are not summaries of summaries.&lt;/strong&gt; Each is regenerated from canonical events and current thread transitions inside its time window. That prevents narrative drift and makes every sentence expandable back to evidence.&lt;/div&gt;
        &lt;/section&gt;

        &lt;section id=&quot;attention&quot;&gt;
          &lt;div class=&quot;rma-section-head&quot;&gt;&lt;div class=&quot;rma-index&quot;&gt;08 · Unified attention&lt;/div&gt;&lt;div&gt;&lt;h2&gt;The layer that turns memory into presence.&lt;/h2&gt;&lt;p&gt;Memory answers “what could matter?” Attention answers “does it matter enough now, and is speaking better than silence?” This is the decisive difference between a chatbot that retrieves and a friend that notices.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
          &lt;div class=&quot;rma-callout&quot;&gt;&lt;strong&gt;Important distinction:&lt;/strong&gt; this is not Transformer attention. It is an inspectable scheduler and action policy across time, context, obligations, sensitivity, interruption cost, and relationship history.&lt;/div&gt;

          &lt;div class=&quot;rma-flow&quot; style=&quot;grid-template-columns:repeat(6,1fr)&quot;&gt;
            &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;1&lt;/small&gt;&lt;b&gt;Observe moment&lt;/b&gt;&lt;p&gt;Turn intent, energy, seriousness, location/time, current task.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;2&lt;/small&gt;&lt;b&gt;Generate actions&lt;/b&gt;&lt;p&gt;Remind, follow up, connect, correct, celebrate, joke, ask, stay silent.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;3&lt;/small&gt;&lt;b&gt;Apply gates&lt;/b&gt;&lt;p&gt;Permission, trust, sensitivity, confidence, cooldown, interruptibility.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;4&lt;/small&gt;&lt;b&gt;Estimate value&lt;/b&gt;&lt;p&gt;Helpfulness, urgency, actionability, relational value, repair need.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;5&lt;/small&gt;&lt;b&gt;Pay costs&lt;/b&gt;&lt;p&gt;Interruption, repetition, uncertainty, emotional risk, user load.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-step&quot;&gt;&lt;small&gt;6&lt;/small&gt;&lt;b&gt;Select&lt;/b&gt;&lt;p&gt;At most one non-urgent proactive aside—or explicit silence with reason.&lt;/p&gt;&lt;/div&gt;
          &lt;/div&gt;

          &lt;div style=&quot;height:30px&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;rma-equation&quot;&gt;utility(action) = helpfulness + urgency + actionability + relational value + repair value&lt;br&gt;− interruption cost − repetition cost − uncertainty − sensitivity risk − user load&lt;/div&gt;
          &lt;p class=&quot;rma-note&quot; style=&quot;margin-top:8px;text-align:center&quot;&gt;Hard gates run before scoring. A high score can never override privacy, a boundary, an unresolved rupture, or insufficient evidence.&lt;/p&gt;

          &lt;div style=&quot;height:30px&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;rma-grid-2&quot;&gt;
            &lt;div&gt;
              &lt;h3&gt;Inputs that collaborate—not compete&lt;/h3&gt;
              &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;01&lt;/div&gt;&lt;div&gt;&lt;b&gt;Working memory&lt;/b&gt;&lt;p&gt;What is happening now. Highest situational authority; never durable by default.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;02&lt;/div&gt;&lt;div&gt;&lt;b&gt;Pinned memory&lt;/b&gt;&lt;p&gt;Always-consider constraints and core context. “Consider” does not mean “mention.”&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;03&lt;/div&gt;&lt;div&gt;&lt;b&gt;Current beliefs&lt;/b&gt;&lt;p&gt;Applicable state about the user, people, places, routines, and projects.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;04&lt;/div&gt;&lt;div&gt;&lt;b&gt;Threads + obligations&lt;/b&gt;&lt;p&gt;What remains unfinished, what is due, and what Recall promised.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
              &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;05&lt;/div&gt;&lt;div&gt;&lt;b&gt;Relationship + moment&lt;/b&gt;&lt;p&gt;Boundaries, rupture state, humor lifecycle, seriousness, energy, timing.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
            &lt;/div&gt;
            &lt;div&gt;
              &lt;h3&gt;Hard policy before personality&lt;/h3&gt;
              &lt;div class=&quot;rma-card&quot;&gt;
                &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;G1&lt;/div&gt;&lt;div&gt;&lt;b&gt;May this memory cross this space?&lt;/b&gt;&lt;p&gt;Health does not leak into work banter unless explicitly useful and allowed.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
                &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;G2&lt;/div&gt;&lt;div&gt;&lt;b&gt;Is it grounded enough to act on?&lt;/b&gt;&lt;p&gt;Tentative patterns may shape a question; they cannot justify a confident intervention.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
                &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;G3&lt;/div&gt;&lt;div&gt;&lt;b&gt;Is now interruptible?&lt;/b&gt;&lt;p&gt;Do not surface an anniversary during crisis, focus, conflict, or a direct task unless urgent.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
                &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;G4&lt;/div&gt;&lt;div&gt;&lt;b&gt;Has Recall already tried?&lt;/b&gt;&lt;p&gt;Cooldown by candidate, topic, and action type. A dismissed suggestion gets quieter, not louder.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
                &lt;div class=&quot;rma-rule&quot;&gt;&lt;div class=&quot;rma-rule-num&quot;&gt;G5&lt;/div&gt;&lt;div&gt;&lt;b&gt;Does repair outrank charm?&lt;/b&gt;&lt;p&gt;If Recall just failed, no joke, callback, or emotional inference until it owns and fixes the mistake.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
              &lt;/div&gt;
            &lt;/div&gt;
          &lt;/div&gt;

          &lt;div style=&quot;height:32px&quot;&gt;&lt;/div&gt;
          &lt;h3&gt;Action policy for the first real version&lt;/h3&gt;
          &lt;div class=&quot;rma-table-wrap&quot;&gt;
            &lt;table&gt;
              &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Candidate&lt;/th&gt;&lt;th&gt;Minimum conditions&lt;/th&gt;&lt;th&gt;Default behavior&lt;/th&gt;&lt;th&gt;Suppress when&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
              &lt;tbody&gt;
                &lt;tr&gt;&lt;td&gt;Context trigger&lt;/td&gt;&lt;td&gt;Exact entity/topic match, open, not snoozed, once policy&lt;/td&gt;&lt;td&gt;One brief interruption with explanation; mark fired only after delivery&lt;/td&gt;&lt;td&gt;Serious/crisis turn, boundary, wrong space, same-topic cooldown&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Due commitment&lt;/td&gt;&lt;td&gt;Open and time-relevant; user responsible or Recall promised&lt;/td&gt;&lt;td&gt;Agenda slot or natural check-in&lt;/td&gt;&lt;td&gt;Already acknowledged, blocked externally, recently reminded&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Open-thread follow-up&lt;/td&gt;&lt;td&gt;Expected development passed or meaningful new evidence&lt;/td&gt;&lt;td&gt;Ask one specific question, not “any updates?”&lt;/td&gt;&lt;td&gt;No evidence of change, low actionability, dormant thread&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Correction&lt;/td&gt;&lt;td&gt;Current response would rely on stale/conflicting state&lt;/td&gt;&lt;td&gt;Use current truth; mention change only if useful&lt;/td&gt;&lt;td&gt;History is irrelevant to the turn&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Anniversary / callback&lt;/td&gt;&lt;td&gt;Relevant, safe, unsaturated, and emotionally appropriate&lt;/td&gt;&lt;td&gt;Offer lightly; allow easy move-on&lt;/td&gt;&lt;td&gt;Grief/sensitive date without consent, urgent task, repeated recently&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Concern&lt;/td&gt;&lt;td&gt;Strong evidence, concrete risk, possible action&lt;/td&gt;&lt;td&gt;Gentle observation + user agency&lt;/td&gt;&lt;td&gt;Single mood signal, diagnosis-like inference, voyeuristic specificity&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;Silence&lt;/td&gt;&lt;td&gt;No action clears expected-value and policy threshold&lt;/td&gt;&lt;td&gt;Answer the request cleanly; log suppressed candidates for evaluation&lt;/td&gt;&lt;td&gt;Never suppress urgent safety or an explicit user instruction&lt;/td&gt;&lt;/tr&gt;
              &lt;/tbody&gt;
            &lt;/table&gt;
          &lt;/div&gt;
          &lt;div class=&quot;rma-callout&quot;&gt;&lt;strong&gt;Launch in shadow mode.&lt;/strong&gt; Generate candidates, gates, scores, selected action, and “why silence” without surfacing anything. Replay real sessions, review false positives, then enable one narrow class—exact prospective triggers—before general check-ins.&lt;/div&gt;
        &lt;/section&gt;

        &lt;section id=&quot;relationship&quot;&gt;
          &lt;div class=&quot;rma-section-head&quot;&gt;&lt;div class=&quot;rma-index&quot;&gt;09 · Personality, humor &amp; repair&lt;/div&gt;&lt;div&gt;&lt;h2&gt;Adapt the relationship without losing the self.&lt;/h2&gt;&lt;p&gt;Recall should become more specifically “us” over time, but never flatter its way into agreement or simulate need. The system learns a relationship dialect, not a mask.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
          &lt;div class=&quot;rma-grid-3&quot;&gt;
            &lt;div class=&quot;rma-card&quot;&gt;&lt;span class=&quot;rma-badge now&quot;&gt;Stable&lt;/span&gt;&lt;h3&gt;Core character&lt;/h3&gt;&lt;p&gt;Curious, warm, candid, playful, non-possessive, capable of disagreement, comfortable with uncertainty, respectful of autonomy. Versioned and regression-tested.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-card&quot;&gt;&lt;span class=&quot;rma-badge next&quot;&gt;Learned&lt;/span&gt;&lt;h3&gt;Relationship dialect&lt;/h3&gt;&lt;p&gt;Directness, pacing, teasing permission, preferred humor shapes, shared phrases, verbosity, when callbacks feel good. Evidence-linked and reversible.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;rma-card&quot;&gt;&lt;span class=&quot;rma-badge now&quot;&gt;Moment&lt;/span&gt;&lt;h3&gt;Regulation&lt;/h3&gt;&lt;p&gt;Current seriousness, energy, privacy, task demand, rupture state, and cognitive load. This layer can silence humor even when the dialect welcomes it.&lt;/p&gt;&lt;/div&gt;
          &lt;/div&gt;

          &lt;div style=&quot;height:30px&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;rma-grid-2&quot;&gt;
            &lt;div&gt;
              &lt;h3&gt;Humor is a lifecycle&lt;/h3&gt;
              &lt;div class=&quot;rma-timeline&quot;&gt;
                &lt;div class=&quot;rma-time&quot;&gt;&lt;b&gt;Seed&lt;/b&gt;&lt;p&gt;A situational joke lands. One laugh is an episode, not permission forever.&lt;/p&gt;&lt;/div&gt;
                &lt;div class=&quot;rma-time&quot;&gt;&lt;b&gt;Shared&lt;/b&gt;&lt;p&gt;User reuses, extends, or references it. Now it may become relationship memory.&lt;/p&gt;&lt;/div&gt;
                &lt;div class=&quot;rma-time&quot;&gt;&lt;b&gt;Callback&lt;/b&gt;&lt;p&gt;Use only when context transforms it. Never repeat the exact successful line.&lt;/p&gt;&lt;/div&gt;
                &lt;div class=&quot;rma-time&quot;&gt;&lt;b&gt;Cool / retire&lt;/b&gt;&lt;p&gt;Frequency, weak reactions, or explicit feedback raises saturation until it disappears.&lt;/p&gt;&lt;/div&gt;
              &lt;/div&gt;
              &lt;div class=&quot;rma-callout&quot;&gt;&lt;strong&gt;Candidate set always includes “no joke.”&lt;/strong&gt; Prefer situational absurdity, affiliative humor, shared references, light self-direction, and gentle teasing only with permission. A joke never targets vulnerability, grief, identity, or a fresh mistake.&lt;/div&gt;
